version: "2"
sql:
  - engine: "sqlite"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
        emit_result_struct_pointers: true
        emit_prepared_queries: true
        emit_pointers_for_null_types: true
        rename:
          list_access_log_row: "AccessLog"
        overrides:
          - column: "users.id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "access_log.id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "stashes.id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "stashes.maintainer_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - column: "stash_member.stash_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "stash_member.user_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - column: "access_log.stash_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "access_log.user_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - column: "users.created_at"
            go_type: "time.Time"
          - column: "stash_member.created_at"
            go_type: "time.Time"
          - column: "access_log.created_at"
            go_type: "time.Time"
          - column: "stashes.created_at"
            go_type: "time.Time"
          - column: "users.expired_at"
            nullable: true
            go_type: "time.Time"
