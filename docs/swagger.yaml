        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonutil.Message'
      security:
      - BearerAuth: []
