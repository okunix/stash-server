basePath: /api/v1
definitions:
  dto.AddSecret:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  dto.AddStashMemberRequest:
    properties:
      stash_id:
        type: string
      user_id:
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      new_password:
        type: string
      old_password:
        type: string
      user_id:
        type: string
    type: object
  dto.CreateStashRequest:
    properties:
      description:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  dto.CreateUserRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  dto.GetUserTokenRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  dto.GetUserTokenResponse:
    properties:
      token:
        type: string
    type: object
  dto.ListMyStashesResponse:
    properties:
      maintainer:
        items:
          $ref: '#/definitions/dto.StashResponse'
        type: array
      member:
        items:
          $ref: '#/definitions/dto.StashResponse'
        type: array
    type: object
  dto.ListStashMemberResponse:
    properties:
      maintainer:
        $ref: '#/definitions/dto.StashMaintainerResponse'
      members:
        items:
          $ref: '#/definitions/dto.StashMemberResponse'
        type: array
    type: object
  dto.ListUsersResponse:
    properties:
      page:
        $ref: '#/definitions/dto.Page'
      result:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
    type: object
  dto.Page:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  dto.SecretResponse:
    properties:
      keys:
        description: Data       map[string]string `json:"data"`
        items:
          type: string
        type: array
      unlocked_at:
        type: string
    type: object
  dto.StashMaintainerResponse:
    properties:
      user_id:
        type: string
      username:
        type: string
    type: object
  dto.StashMemberResponse:
    properties:
      since:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  dto.StashResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      locked:
        type: boolean
      maintainer_id:
        type: string
      name:
        type: string
    type: object
  dto.UpdateStashRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      expired_at:
        type: string
      id:
        type: string
      locked:
        type: boolean
      username:
        type: string
    type: object
  handlers.UnlockStash.request:
    properties:
      password:
        type: string
    type: object
  jsonutil.Message:
    properties:
      code:
        type: integer
      detail: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: Stash Password Manager API Server
  title: Stash API Server
  version: "0.0"
paths:
  /auth/change-password:
    patch:
      consumes:
      - application/json
      description: change password for current user or (if admin) for specified user
      parameters:
      - description: change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonutil.Message'
      security:
      - BearerAuth: []
      summary: Change Password
      tags:
      - Accounts
  /auth/login:
    post:
      consumes:
      - application/json
      description: Get User JWT Token for Login
      parameters:
      - description: user credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.GetUserTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetUserTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jsonutil.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonutil.Message'
      summary: Login User
      tags:
      - Accounts
  /auth/whoami:
