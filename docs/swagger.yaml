      tags:
      - Stashes
    patch:
      consumes:
      - application/json
      parameters:
      - description: Stash ID
        in: path
        name: id
        required: true
        type: string
      - description: update stash request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateStashRequest'
      produces:
