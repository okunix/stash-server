          schema:
            $ref: '#/definitions/jsonutil.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonutil.Message'
      security:
      - BearerAuth: []
      summary: Get current user information
      tags:
      - Accounts
  /stashes:
