name: stash-server

services:
  stash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stash-server
    ports:
      - 7878:7878/tcp
    volumes:
      - ./server.yaml:/etc/stash/server.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:18-trixie
    container_name: stash-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stash_db
    ports:
      - 5432:5432/tcp
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD", "pg_isready", "-d", "$$POSTGRES_DB", "-U", "$$POSTGRES_USER"]
      interval: 10s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: {}
